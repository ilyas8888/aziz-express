<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>Connexion — Aziz Express</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      background: linear-gradient(160deg, #0F172A 0%, #1E293B 50%, #0F172A 100%);
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand .logo {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #FF5A1F, #FF8C42);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin: 0 auto 14px;
      box-shadow: 0 8px 24px rgba(255,90,31,0.4);
    }

    .brand h1 {
      font-size: 26px; font-weight: 700;
      color: white; letter-spacing: -0.5px;
    }

    .brand p {
      font-size: 13px; color: rgba(255,255,255,0.5);
      margin-top: 4px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 28px 24px;
      width: 100%;
      max-width: 360px;
    }

    .form-group { margin-bottom: 14px; }
    .form-group label {
      font-size: 12px; font-weight: 500;
      color: rgba(255,255,255,0.6);
      display: block; margin-bottom: 6px;
    }
    .form-group input {
      width: 100%; padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.07);
      color: white; font-size: 15px;
      font-family: 'Poppins', sans-serif;
      outline: none;
    }
    .form-group input::placeholder { color: rgba(255,255,255,0.3); }
    .form-group input:focus { border-color: #FF5A1F; }

    .btn-login {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, #FF5A1F, #FF8C42);
      color: white; border: none;
      border-radius: 14px;
      font-size: 16px; font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer; margin-top: 6px;
      box-shadow: 0 6px 20px rgba(255,90,31,0.4);
      letter-spacing: 0.3px;
    }

    .btn-login:active { transform: scale(0.98); }

    .error {
      color: #ff6b6b; font-size: 13px;
      margin-top: 12px; text-align: center; display: none;
    }
  </style>
</head>
<body>
  <div class="brand">
    <div class="logo">🛵</div>
    <h1>Aziz Express</h1>
    <p>Espace livreur</p>
  </div>

  <div class="card">
    <div class="form-group">
      <label>EMAIL</label>
      <input id="email" type="email" placeholder="votre@email.com" />
    </div>
    <div class="form-group">
      <label>MOT DE PASSE</label>
      <input id="password" type="password" placeholder="••••••••" />
    </div>
    <button class="btn-login" onclick="login()">Se connecter →</button>
    <p class="error" id="errorMsg">Email ou mot de passe incorrect</p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    const BASE = window.location.pathname.replace(/\/[^/]*$/, '/');

    firebase.auth().onAuthStateChanged(user => {
      if (user) window.location.href = BASE + 'dashboard.html';
    });

    function login() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      document.getElementById('errorMsg').style.display = 'none';

      firebase.auth().signInWithEmailAndPassword(email, password)
        .then(cred => {
          const uid = cred.user.uid;
          db.ref('users/' + uid).once('value', snap => {
            if (!snap.exists()) {
              db.ref('users/' + uid).set({ role: 'admin', name: 'Aziz', email });
            }
            window.location.href = BASE + 'dashboard.html';
          });
        })
        .catch(() => document.getElementById('errorMsg').style.display = 'block');
    }

    // Login avec touche Entrée
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
