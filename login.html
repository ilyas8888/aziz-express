<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Aziz Express</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 32px 24px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
    }

    .logo { font-size: 48px; margin-bottom: 8px; }
    h1 { font-size: 22px; color: #222; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 28px; }

    .form-group { margin-bottom: 14px; text-align: left; }
    .form-group label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
    .form-group input {
      width: 100%; padding: 13px;
      border-radius: 10px; border: 1px solid #ddd;
      font-size: 15px;
    }

    .btn-login {
      width: 100%; padding: 15px;
      background: #25D366; color: white;
      border: none; border-radius: 12px;
      font-size: 16px; font-weight: bold;
      cursor: pointer; margin-top: 8px;
    }

    .error {
      color: #e74c3c; font-size: 13px;
      margin-top: 12px; display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🛵</div>
    <h1>Aziz Express</h1>
    <p class="subtitle">Espace livreur</p>

    <div class="form-group">
      <label>Email</label>
      <input id="email" type="email" placeholder="votre@email.com" />
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input id="password" type="password" placeholder="••••••••" />
    </div>

    <button class="btn-login" onclick="login()">Se connecter</button>
    <p class="error" id="errorMsg">Email ou mot de passe incorrect</p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    // Si déjà connecté → rediriger
    firebase.auth().onAuthStateChanged(user => {
      if (user) window.location.href = '/dashboard.html';
    });

    function login() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      document.getElementById('errorMsg').style.display = 'none';

      firebase.auth().signInWithEmailAndPassword(email, password)
        .then(() => window.location.href = '/dashboard.html')
        .catch(() => document.getElementById('errorMsg').style.display = 'block');
    }

    // Login avec touche Entrée
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
