<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <title>Suivi — Aziz Express</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #000;
      height: 100vh;
      overflow: hidden;
    }

    #map {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    /* TOP BAR */
    .top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: 16px;
      background: linear-gradient(to bottom, rgba(15,23,42,0.85) 0%, transparent 100%);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-logo {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, #FF5A1F, #FF8C42);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .brand-text h1 { font-size: 15px; font-weight: 700; color: white; }
    .brand-text p  { font-size: 11px; color: rgba(255,255,255,0.55); }

    /* STATUS PILL */
    .status-pill {
      position: absolute;
      top: 70px; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: white;
      border-radius: 20px;
      padding: 8px 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      white-space: nowrap;
    }

    .pulse-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #FF5A1F;
      animation: pulse 1.4s infinite;
    }

    .pulse-dot.done { background: #22c55e; animation: none; }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(255,90,31,0.5); }
      70%  { box-shadow: 0 0 0 8px rgba(255,90,31,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,90,31,0); }
    }

    .status-text {
      font-size: 13px; font-weight: 600;
      color: #0F172A;
    }

    /* BOTTOM CARD */
    .bottom-card {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      background: white;
      border-radius: 24px 24px 0 0;
      padding: 20px 20px 36px;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.15);
    }

    .drag-handle {
      width: 40px; height: 4px;
      background: #e2e8f0;
      border-radius: 2px;
      margin: 0 auto 18px;
    }

    .courier-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .courier-avatar {
      width: 50px; height: 50px;
      background: linear-gradient(135deg, #FF5A1F, #FF8C42);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }

    .courier-info { flex: 1; }
    .courier-name { font-size: 16px; font-weight: 700; color: #0F172A; }
    .courier-sub  { font-size: 12px; color: #94a3b8; margin-top: 2px; }

    .btn-call {
      background: #FFF5F0;
      border: none; border-radius: 12px;
      width: 46px; height: 46px;
      font-size: 22px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
    }

    .info-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .info-box {
      background: #f8fafc;
      border-radius: 12px;
      padding: 12px 14px;
    }

    .info-box .lbl { font-size: 11px; color: #94a3b8; font-weight: 500; }
    .info-box .val { font-size: 16px; font-weight: 700; color: #0F172A; margin-top: 3px; }

    /* FINISHED STATE */
    .finished-banner {
      display: none;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-radius: 14px;
      padding: 16px;
      text-align: center;
      color: white;
      margin-top: 12px;
    }
    .finished-banner .icon { font-size: 32px; margin-bottom: 6px; }
    .finished-banner h3 { font-size: 16px; font-weight: 700; }
    .finished-banner p  { font-size: 13px; opacity: 0.85; margin-top: 4px; }
  </style>
</head>
<body>

<div id="map"></div>

<!-- TOP -->
<div class="top-bar">
  <div class="brand">
    <div class="brand-logo">🛵</div>
    <div class="brand-text">
      <h1>Aziz Express</h1>
      <p>Livraison rapide à Oujda</p>
    </div>
  </div>
</div>

<div class="status-pill" id="statusPill">
  <div class="pulse-dot" id="pulseDot"></div>
  <span class="status-text" id="statusText">Localisation...</span>
</div>

<!-- BOTTOM CARD -->
<div class="bottom-card">
  <div class="drag-handle"></div>

  <div class="courier-row">
    <div class="courier-avatar">🛵</div>
    <div class="courier-info">
      <div class="courier-name">Aziz</div>
      <div class="courier-sub">Votre livreur · En route</div>
    </div>
    <a class="btn-call" href="https://wa.me/212616937149" target="_blank">📱</a>
  </div>

  <div class="info-row">
    <div class="info-box">
      <div class="lbl">Distance</div>
      <div class="val" id="distVal">—</div>
    </div>
    <div class="info-box">
      <div class="lbl">Temps estimé</div>
      <div class="val" id="etaVal">—</div>
    </div>
  </div>

  <div class="finished-banner" id="finishedBanner">
    <div class="icon">✅</div>
    <h3>Livraison terminée !</h3>
    <p>Merci d'avoir choisi Aziz Express</p>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  const OUJDA = [34.6867, -1.9114];
  const map = L.map('map', { zoomControl: false }).setView(OUJDA, 14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  const courierIcon = L.divIcon({
    html: `<div style="font-size:36px;filter:drop-shadow(2px 2px 4px rgba(0,0,0,0.4))">🛵</div>`,
    iconSize: [40, 40], className: ''
  });

  const destIcon = L.divIcon({
    html: `<div style="font-size:32px;filter:drop-shadow(2px 2px 4px rgba(0,0,0,0.3))">🏠</div>`,
    iconSize: [36, 36], className: ''
  });

  let courierMarker = null;
  let destMarker    = null;
  let routeLine     = null;
  let firstView     = true;

  const deliveryId = new URLSearchParams(window.location.search).get('id') || '';

  function haversineKm(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 +
              Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function drawRoute(from, to) {
    const url = `https://router.project-osrm.org/route/v1/driving/${from[1]},${from[0]};${to[1]},${to[0]}?overview=full&geometries=geojson`;
    fetch(url)
      .then(r => r.json())
      .then(data => {
        if (!data.routes || !data.routes[0]) return;
        const route = data.routes[0];
        const coords = route.geometry.coordinates.map(([lng, lat]) => [lat, lng]);
        if (routeLine) map.removeLayer(routeLine);
        routeLine = L.polyline(coords, { color: '#FF5A1F', weight: 5, opacity: 0.85 }).addTo(map);

        // Distance et ETA depuis OSRM
        const km  = (route.distance / 1000).toFixed(1);
        const min = Math.ceil(route.duration / 60);
        document.getElementById('distVal').textContent = `${km} km`;
        document.getElementById('etaVal').textContent  = min < 60 ? `${min} min` : `${Math.floor(min/60)}h${min%60}`;
      })
      .catch(() => {
        if (routeLine) map.removeLayer(routeLine);
        routeLine = L.polyline([from, to], { color: '#FF5A1F', weight: 4, dashArray: '8,10' }).addTo(map);
        const km = haversineKm(from[0], from[1], to[0], to[1]);
        document.getElementById('distVal').textContent = `~${km.toFixed(1)} km`;
        document.getElementById('etaVal').textContent  = `~${Math.ceil(km * 3)} min`;
      });
  }

  db.ref('livraisons/' + deliveryId).on('value', snap => {
    const data = snap.val();
    if (!data) return;

    const hasPos = data.lat && data.lng;
    const pos    = hasPos ? [data.lat, data.lng] : null;

    // Marqueur livreur
    if (pos) {
      if (!courierMarker) {
        courierMarker = L.marker(pos, { icon: courierIcon }).addTo(map).bindPopup('🛵 Aziz');
      } else {
        courierMarker.setLatLng(pos);
      }
    }

    // Marqueur destination
    if (data.destLat && data.destLng && !destMarker) {
      destMarker = L.marker([data.destLat, data.destLng], { icon: destIcon })
        .addTo(map)
        .bindPopup('🏠 Votre adresse')
        .openPopup();
    }

    // Route
    if (pos && data.destLat && data.destLng) {
      drawRoute(pos, [data.destLat, data.destLng]);
    }

    // Ajuster la vue
    if (firstView && pos) {
      if (data.destLat && data.destLng) {
        map.fitBounds(L.latLngBounds([pos, [data.destLat, data.destLng]]), { padding: [60, 60] });
      } else {
        map.setView(pos, 15);
      }
      firstView = false;
    } else if (pos && !data.destLat) {
      map.setView(pos, 15);
    }

    // Statut
    if (!data.active) {
      document.getElementById('pulseDot').classList.add('done');
      document.getElementById('statusText').textContent = 'Livraison terminée';
      document.getElementById('finishedBanner').style.display = 'block';
      document.getElementById('distVal').textContent = '—';
      document.getElementById('etaVal').textContent  = '—';
      if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
    } else {
      document.getElementById('statusText').textContent = '🛵 En route vers vous';
    }
  });
</script>
</body>
</html>
