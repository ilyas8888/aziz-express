 <!DOCTYPE html>
  <html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Contacts — Aziz Express</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Poppins', sans-serif; background: #FFF5F0; min-height: 100vh; }

      header {
        background: #0F172A; color: white;
        padding: 16px 20px;
        display: flex; align-items: center; justify-content: space-between;
        position: sticky; top: 0; z-index: 100;
        box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      }
      header h1 { font-size: 20px; }
      header a { color: white; font-size: 13px; text-decoration: none; }

      .modal-overlay {
        display: none; position: fixed; inset: 0;
        background: rgba(0,0,0,0.5);
        z-index: 200; align-items: flex-end; justify-content: center;
      }
      .modal-overlay.open { display: flex; }

      .modal {
        background: white; width: 100%; max-width: 500px;
        border-radius: 20px 20px 0 0;
        padding: 20px; max-height: 90vh; overflow-y: auto;
      }
      .modal h2 { font-size: 18px; margin-bottom: 16px; }

      .form-group { margin-bottom: 12px; }
      .form-group label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
      .form-group input {
        width: 100%; padding: 12px;
        border-radius: 10px; border: 1px solid #ddd; font-size: 15px;
      }

      #map { width: 100%; height: 220px; border-radius: 12px; margin: 10px 0; border: 2px solid #ddd; }
      #map.selected { border-color: #FF5A1F; }

      .map-hint { font-size: 12px; color: #888; margin-bottom: 8px; }
      .coords-display { font-size: 12px; color: #FF5A1F; min-height: 18px; margin-bottom: 10px; font-weight: bold; }

      .btn-gps {
        width: 100%; padding: 11px;
        background: #FFF5F0; color: #FF5A1F;
        border: 2px solid #FF5A1F; border-radius: 10px;
        font-size: 14px; font-weight: bold; cursor: pointer; margin-bottom: 12px;
      }
      .btn-save {
        width: 100%; padding: 14px;
        background: #0F172A; color: white;
        border: none; border-radius: 12px;
        font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 8px;
      }
      .btn-cancel {
        width: 100%; padding: 11px;
        background: #FFF5F0; color: #666;
        border: none; border-radius: 12px; font-size: 14px; cursor: pointer;
      }

      .contacts { padding: 12px 16px 80px; display: flex; flex-direction: column; gap: 10px; }

      .contact-card {
        background: white; border-radius: 14px; padding: 14px;
        box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        display: flex; align-items: center; gap: 12px;
      }
      .avatar {
        width: 46px; height: 46px; background: #FFE8DC;
        border-radius: 50%; display: flex; align-items: center;
        justify-content: center; font-size: 20px; flex-shrink: 0;
      }
      .contact-info { flex: 1; }
      .contact-name { font-size: 16px; font-weight: bold; color: #222; }
      .contact-phone { font-size: 13px; color: #888; margin-top: 2px; }
      .contact-loc { font-size: 12px; color: #FF5A1F; margin-top: 3px; }

      .contact-actions { display: flex; gap: 8px; }
      .btn-icon { padding: 8px 10px; border: none; border-radius: 9px; cursor: pointer; font-size: 16px; }
      .btn-icon.edit   { background: #FFE8DC; }
      .btn-icon.delete { background: #fdecea; }

      .fab {
        position: fixed; bottom: 24px; right: 20px;
        background: #0F172A; color: white; border: none;
        border-radius: 50px; padding: 15px 22px;
        font-size: 15px; font-weight: bold;
        box-shadow: 0 4px 14px rgba(255,90,31,0.5); cursor: pointer;
      }
      .empty { text-align: center; padding: 50px 20px; color: #aaa; font-size: 15px; }
      .empty .icon { font-size: 48px; margin-bottom: 12px; }
    </style>
  </head>
  <body>

  <header>
    <h1>👥 Contacts</h1>
    <a href="dashboard.html">← Dashboard</a>
  </header>

  <div style="padding: 12px 16px 0;">
    <input id="searchInput" type="text" placeholder="🔍 Rechercher un client..."
      oninput="renderContacts()"
      style="width:100%; padding:11px 14px; border-radius:12px; border:1px solid #ddd; font-size:14px; background:white;" />
  </div>

  <div class="contacts" id="contactsList"></div>

  <button class="fab" onclick="openModal()">+ Nouveau client</button>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modalTitle">Nouveau client</h2>

      <div class="form-group">
        <label>Nom</label>
        <input id="inputName" type="text" placeholder="Ex: Mohammed Alami" />
      </div>
      <div class="form-group">
        <label>Téléphone</label>
        <input id="inputPhone" type="tel" placeholder="Ex: 0612345678" />
      </div>

      <div class="map-hint">📍 Tapez sur la carte pour marquer le domicile :</div>
      <div id="map"></div>
      <div class="coords-display" id="coordsDisplay">Aucune position sélectionnée</div>

      <button class="btn-gps" onclick="useMyGPS()">📡 Utiliser ma position actuelle</button>
      <button class="btn-save" onclick="saveContact()">Enregistrer</button>
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    const BASE = window.location.pathname.replace(/\/[^/]*$/, '/');

    firebase.auth().onAuthStateChanged(user => {
      if (!user) window.location.href = BASE + 'login.html';
    });

    let map = null;
    let marker = null;
    let selectedLat = null;
    let selectedLng = null;
    let editingId = null;
    let contacts = [];

    const OUJDA = [34.6867, -1.9114];

    function openModal(contact) {
      editingId = contact ? contact.id : null;
      document.getElementById('modalTitle').textContent = contact ? 'Modifier client' : 'Nouveau client';
      document.getElementById('inputName').value  = contact ? contact.name  : '';
      document.getElementById('inputPhone').value = contact ? contact.phone : '';
      selectedLat = contact && contact.lat ? contact.lat : null;
      selectedLng = contact && contact.lng ? contact.lng : null;

      document.getElementById('modalOverlay').classList.add('open');
      updateCoordsDisplay();

      // Attendre que le modal soit visible avant d'initialiser la carte
      setTimeout(() => {
        if (!map) {
          map = L.map('map').setView(OUJDA, 13);
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
          map.on('click', e => placeMarker(e.latlng.lat, e.latlng.lng));
        }

        map.invalidateSize();

        if (marker) { map.removeLayer(marker); marker = null; }

        if (selectedLat && selectedLng) {
          placeMarker(selectedLat, selectedLng);
          map.setView([selectedLat, selectedLng], 15);
        } else {
          map.setView(OUJDA, 13);
        }
      }, 200);
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    function placeMarker(lat, lng) {
      selectedLat = lat;
      selectedLng = lng;
      if (marker) map.removeLayer(marker);
      marker = L.marker([lat, lng]).addTo(map);
      document.getElementById('map').classList.add('selected');
      updateCoordsDisplay();
    }

    function updateCoordsDisplay() {
      const el = document.getElementById('coordsDisplay');
      el.textContent = (selectedLat && selectedLng)
        ? `✓ Position : ${selectedLat.toFixed(5)}, ${selectedLng.toFixed(5)}`
        : 'Aucune position sélectionnée';
    }

    function useMyGPS() {
      if (!navigator.geolocation) return alert('GPS non supporté');
      navigator.geolocation.getCurrentPosition(
        pos => {
          placeMarker(pos.coords.latitude, pos.coords.longitude);
          map.setView([pos.coords.latitude, pos.coords.longitude], 16);
        },
        () => alert("Impossible d'obtenir la position")
      );
    }

    function saveContact() {
      const name  = document.getElementById('inputName').value.trim();
      const phone = document.getElementById('inputPhone').value.trim();
      if (!name) return alert('Entrez un nom');

      const data = { name, phone, lat: selectedLat, lng: selectedLng, updatedAt: Date.now() };
      const ref = editingId
        ? db.ref('contacts/' + editingId)
        : db.ref('contacts').push();
      ref.set(data);
      closeModal();
    }

    function deleteContact(id) {
      if (!confirm('Supprimer ce contact ?')) return;
      db.ref('contacts/' + id).remove();
    }

    function renderContacts() {
      const query = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
      const filtered = contacts.filter(c =>
        !query ||
        (c.name  || '').toLowerCase().includes(query) ||
        (c.phone || '').includes(query)
      );

      const list = document.getElementById('contactsList');
      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty"><div class="icon">👥</div>${query ? 'Aucun résultat' : 'Aucun client enregistré'}</div>`;
        return;
      }
      list.innerHTML = '';
      filtered.forEach(c => {
        const card = document.createElement('div');
        card.className = 'contact-card';
        card.innerHTML = `
          <div class="avatar">👤</div>
          <div class="contact-info">
            <div class="contact-name">${c.name}</div>
            ${c.phone ? `<div class="contact-phone">📞 ${c.phone}</div>` : ''}
            ${c.lat
              ? `<div class="contact-loc">📍 Position enregistrée</div>`
              : `<div class="contact-loc" style="color:#bbb">📍 Pas de position</div>`}
          </div>
          <div class="contact-actions">
            <button class="btn-icon edit">✏️</button>
            <button class="btn-icon delete">🗑</button>
          </div>
        `;
        // Event listeners directs — évite les bugs avec apostrophes dans les noms
        card.querySelector('.btn-icon.edit').onclick   = () => openModal(c);
        card.querySelector('.btn-icon.delete').onclick = () => deleteContact(c.id);
        list.appendChild(card);
      });
    }

    db.ref('contacts').on('value', snap => {
      const data = snap.val() || {};
      contacts = Object.entries(data).map(([id, v]) => ({ id, ...v }));
      contacts.sort((a, b) => a.name.localeCompare(b.name));
      renderContacts();
    });
  </script>
  </body>
  </html>
